<!DOCTYPE html>
<html>
<head>
  <title>Galería</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h1>Fotos del alumno</h1>
<div id="gallery"></div>

<button onclick="buy()">Comprar seleccion</button>

<script>
const supabaseUrl = 'https://yrgwrrqekropjnlycxfb.supabase.co';
const supabaseKey = 'sb_publishable_atpzyLUPdoHRrh0b4EkDtg_DqQDxUMy';

const client = supabase.createClient(supabaseUrl, supabaseKey);

let selectedPhotos = [];
let student = null;

async function loadGallery() {
  const { data, error } = await client
    .from('students')
    .select('*')
    .eq('access_token', 'test123')
    .single();

  if (error) {
    console.error(error);
    return;
  }

  student = data;

  const { data: photos, error: error2 } = await client
    .from('photos')
    .select('*')
    .eq('student_id', student.id);

  if (error2) {
    console.error(error2);
    return;
  }

  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';

  photos.forEach(photo => {
    const img = document.createElement('img');
    img.src = photo.image_url;
    img.style.width = '200px';
    img.style.margin = '10px';
    img.style.cursor = 'pointer';

    img.onclick = () => {
      if (selectedPhotos.includes(photo.id)) {
        selectedPhotos = selectedPhotos.filter(id => id !== photo.id);
        img.style.border = 'none';
      } else {
        selectedPhotos.push(photo.id);
        img.style.border = '4px solid green';
      }
    };

    gallery.appendChild(img);
  });
}

async function buy() {
  if (selectedPhotos.length === 0) {
    alert("Selecciona al menos una foto");
    return;
  }

  const { error } = await client.from('orders').insert({
    student_id: student.id,
    photos: selectedPhotos
  });

  if (error) {
    console.error(error);
    alert("Error guardando pedido");
    return;
  }

  // Ir a Stripe
  window.location.href = "https://buy.stripe.com/fZu9ATcT2bc75nq606dEs02";
}



loadGallery();
</script>
