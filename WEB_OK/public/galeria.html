<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
h2{padding:20px;}

#galeria{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
  padding:20px;
  margin-right:260px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  cursor:pointer;
}

.botones{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}

button{
  padding:6px;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
}

#carritoBox{
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:white;
  border-left:1px solid #ddd;
  padding:10px;
  overflow:auto;
}

.item{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.item img{width:40px;}

#modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

#modal img{
  max-width:80%;
  max-height:80%;
}
</style>
</head>

<body>

<h2>Galería</h2>
<div id="galeria"></div>

<div id="carritoBox">
  <h3>Carrito</h3>
  <div id="carrito"></div>

  <div>
    <b>Precios</b><br><br>
    Digital:<br>
    De 1 a 8 = 8€<br>
    De 9 a 15 = 7€<br>
    16+ = 6€<br><br>

    Impresa:<br>
    De 1 a 8 = 10€<br>
    De 9 a 15 = 9€<br>
    16+ = 8€
  </div>

  <h4 id="total">Total: 0€</h4>
  <button onclick="comprar()">Comprar</button>
</div>

<div id="modal" onclick="cerrarModal(event)">
  <img id="modalImg">
</div>

<script>
let carrito = {};
const ENVIO = 5.9;

/* PRECIOS */
function precio(tipo,cantidad){
  if(tipo==="digital"){
    if(cantidad>=16) return 6;
    if(cantidad>=9) return 7;
    return 8;
  }else{
    if(cantidad>=16) return 8;
    if(cantidad>=9) return 9;
    return 10;
  }
}

/* CARGAR */
fetch("/fotos")
.then(r=>r.json())
.then(data=>{
  const g=document.getElementById("galeria");

  data.forEach(ruta=>{
    g.innerHTML+=`
    <div class="card">
      <img src="${ruta}" onclick="openModal('${ruta}')">
      <div class="botones">
        <button onclick="add('${ruta}','digital')">Digital</button>
        <button onclick="add('${ruta}','impresa')">Impresa</button>
      </div>
    </div>`;
  });
});

/* MODAL */
function openModal(ruta){
  modal.style.display="flex";
  modalImg.src=ruta;
}

function cerrarModal(e){
  if(e.target.id==="modal") modal.style.display="none";
}

/* ADD */
function add(ruta,tipo){
  if(!carrito[ruta]) carrito[ruta]={digital:0,impresa:0};
  carrito[ruta][tipo]++;
  render();
}

/* REMOVE */
function remove(ruta,tipo){
  carrito[ruta][tipo]--;
  if(carrito[ruta].digital===0 && carrito[ruta].impresa===0){
    delete carrito[ruta];
  }
  render();
}

/* RENDER */
function render(){
  let html="";
  let total=0;

  Object.keys(carrito).forEach(r=>{
    let item=carrito[r];

    if(item.digital>0){
      let p=precio("digital",item.digital);
      total+=p*item.digital;

      html+=`<div class="item">
        <img src="${r}">
        digital ${item.digital} x ${p}€
        <button onclick="remove('${r}','digital')">-</button>
      </div>`;
    }

    if(item.impresa>0){
      let p=precio("impresa",item.impresa);
      total+=p*item.impresa;

      html+=`<div class="item">
        <img src="${r}">
        impresa ${item.impresa} x ${p}€
        <button onclick="remove('${r}','impresa')">-</button>
      </div>`;
    }
  });

  total = total>0 ? total + ENVIO : 0;

  document.getElementById("carrito").innerHTML=html;
  document.getElementById("total").innerText="Total: "+total+"€";
}

/* STRIPE */
async function comprar(){
  let items=[];

  Object.keys(carrito).forEach(r=>{
    let item=carrito[r];
    if(item.digital>0) items.push({tipo:"digital",cantidad:item.digital});
    if(item.impresa>0) items.push({tipo:"impresa",cantidad:item.impresa});
  });

  const res=await fetch("/crear-checkout",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({items})
  });

  const data=await res.json();
  window.location.href=data.url;
}
</script>

</body>
</html>
