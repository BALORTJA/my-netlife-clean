<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 20px;
    }

    #galeria {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    img {
      width: 200px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<h1>Tus fotos</h1>

<div id="galeria"></div>

<script>
// 🔐 comprobar usuario
const usuario = localStorage.getItem("usuarioActivo");

if (!usuario) {
  alert("No has iniciado sesión");
  window.location.href = "index.html";
}

// 📁 ruta de fotos
const ruta = "fotos/" + usuario + "/";

// ⚠️ AJUSTA estos nombres según tus fotos
const imagenes = [
  "1.jpg",
  "2.jpg",
  "3.jpg",
  "4.jpg",
  "5.jpg"
];

// 📦 contenedor
const contenedor = document.getElementById("galeria");

// 📸 cargar imágenes
imagenes.forEach(img => {
  const imagen = document.createElement("img");
  imagen.src = ruta + img;

  imagen.onerror = () => {
    imagen.style.display = "none"; // si no existe, la oculta
  };

  contenedor.appendChild(imagen);
});
</script>

</body>
</html>
