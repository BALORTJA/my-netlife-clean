<!DOCTYPE html>
<html>
<head>
  <title>Panel Admin</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    table {
      border-collapse: collapse;
      margin: auto;
      margin-top: 20px;
      width: 90%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
    }

    th {
      background: #f4f4f4;
    }

    tr:hover {
      background: #f9f9f9;
    }
  </style>
</head>

<body>

<h1>PANEL ADMIN</h1>

<button onclick="cargarPedidos()">Cargar pedidos</button>

<table>
  <thead>
    <tr>
      <th>Alumno</th>
      <th>Fotos</th>
      <th>Total (€)</th>
      <th>Fecha</th>
    </tr>
  </thead>
  <tbody id="tablaPedidos"></tbody>
</table>

<script>

const SUPABASE_URL = "https://yrgwrrqekropjnlycxfb.supabase.co";
const API_KEY = "sb_publishable_atpzyLUPdoHRrh0b4EkDtg_DqQDxUMy";

async function cargarPedidos() {

  const tabla = document.getElementById("tablaPedidos");
  tabla.innerHTML = "<tr><td colspan='4'>Cargando...</td></tr>";

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/pedidos?select=*`, {
      headers: {
        "apikey": API_KEY,
        "Authorization": `Bearer ${API_KEY}`
      }
    });

    const data = await res.json();
if (data.length === 0) {
  tabla.innerHTML = "<tr><td colspan='4'>No hay pedidos todavía</td></tr>";
  return;
}

    tabla.innerHTML = "";

    data.forEach(pedido => {
      const fila = document.createElement("tr");

      fila.innerHTML = `
  <td>${pedido.alumno}</td>
  <td>${pedido.fotos}</td>
  <td>${pedido.total}</td>
  <td>${pedido.created_at || ""}</td>
`;

      tabla.appendChild(fila);
    });

  } catch (error) {
    console.error(error);
    tabla.innerHTML = "Error cargando pedidos";
  }
}

</script>

</body>
</html>
